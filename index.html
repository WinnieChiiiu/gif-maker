<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Winnie's GIF 動態工坊</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍘</text></svg>">
    
    <script src="https://cdn.jsdelivr.net/npm/gif.js.optimized@1.0.1/dist/gif.worker.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js.optimized@1.0.1/dist/gif.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0e17; 
            color: #a9b2c3; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            font-size: 0.95rem;
        }
        :root { 
            --neon-cyan: #00ffff; 
            --neon-blue: #3498db; 
            --btn-start: #3498db; 
            --btn-end: #2980b9; 
            --btn-green-start: #2ecc71; 
            --btn-green-end: #27ae60; 
        }

        .left-panel { 
            width: 50%; 
            min-width: 50%; 
            flex-shrink: 0; 
            height: 100%; 
            overflow-y: auto; 
            padding: 30px; 
            box-sizing: border-box; 
            background-color: #121726; 
            border-right: 2px solid #1a2233; 
        }
        
        .right-panel { 
            width: 50%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background-color: #111a2e; 
            padding: 20px; 
            box-sizing: border-box; 
            overflow: hidden;
        }
        
        h1 { 
            color: var(--neon-cyan); 
            margin-top: 0; 
            font-weight: 666; 
            letter-spacing: 2px; 
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); 
        }
        .section { 
            background-color: #1a2233; 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            border-left: 5px solid var(--neon-cyan); 
        }
        
        .label-with-btn { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 8px; 
        }
        label { 
            font-weight: bold; 
            color: var(--neon-cyan); 
        }
        
        input[type="file"], select, input[type="range"] { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #1a2233; 
            border-radius: 6px; 
            background: #0a0e17; 
            color: #a9b2c3; 
            box-sizing: border-box; 
        }
        
        button { 
            border: none; 
            padding: 12px 24px; 
            font-size: 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.3s; 
            width: 100%; 
            font-weight: bold; 
            color: #fff; 
        }
        button:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
        }
        .btn-primary { background: linear-gradient(135deg, var(--btn-start), var(--btn-end)); }
        .btn-clear { background: linear-gradient(135deg, #e74c3c, #c0392b); width: auto; padding: 8px 16px; font-size: 13px; display: block; margin: 15px auto 0; }
        .btn-green { background: linear-gradient(135deg, var(--btn-green-start), var(--btn-green-end)); }
        .btn-secondary { background: #34495e; }

        .btn-gem { 
            background: linear-gradient(135deg, #8e44ad, #a29bfe); 
            width: auto; 
            padding: 4px 12px; 
            font-size: 12px; 
            border-radius: 20px; 
            text-decoration: none; 
            color: #fff; 
            display: inline-flex; 
            align-items: center; 
            transition: 0.3s; 
            box-shadow: 0 0 10px rgba(142, 68, 173, 0.4); 
        }
        .btn-gem:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(162, 155, 254, 0.8); }

        #framePreviewList { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); 
            gap: 10px; 
            margin-top: 10px; 
            min-height: 80px; 
            background: rgba(0,0,0,0.2); 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px dashed #2c394e; 
        }
        .frame-item { 
            background-color: #0a0e17; 
            border: 1px solid var(--neon-blue); 
            border-radius: 6px; 
            position: relative; 
            aspect-ratio: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            cursor: grab; 
        }
        .frame-item:active { cursor: grabbing; }
        .frame-item img { max-width: 90%; max-height: 90%; object-fit: contain; pointer-events: none; }
        
        .delete-btn, .crop-btn { 
            position: absolute; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            padding: 2px 6px; 
            font-size: 10px; 
            cursor: pointer; 
            z-index: 10; 
            opacity: 0.8; 
            transition: 0.2s; 
            width: auto; 
            height: auto; 
        }
        .delete-btn { top: 4px; left: 4px; background: rgba(231, 76, 60, 0.9); }
        .crop-btn { bottom: 4px; right: 4px; background: rgba(52, 152, 219, 0.9); }

        #interactiveBox, #resultBox { 
            display: none; 
            width: 100%; 
            max-width: 500px; 
            text-align: center; 
            flex-direction: column; 
            align-items: center; 
        }
        #previewCanvas, #gifResult { 
            border: 2px dashed var(--neon-cyan); 
            background: #000; 
            max-width: 100%; 
            max-height: 55vh; 
            border-radius: 8px; 
            object-fit: contain; 
            margin-bottom: 10px; 
        }

        #loading { display: none; color: var(--neon-cyan); font-weight: bold; font-size: 1.2rem; text-align: center; }
        #cropModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .crop-container { width: 90%; max-width: 700px; height: 50vh; background: #fff; margin-bottom: 20px; overflow: hidden; }

        .footer-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 30px; padding-bottom: 20px; }
        .winnie-badge { 
            display: inline-block; font-weight: 900; color: #888; padding: 10px 25px; 
            border-radius: 30px; border: 1px solid #333; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: transparent; cursor: default; 
        }
        .winnie-badge:hover { 
            color: #fff; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); 
            box-shadow: 0 5px 15px rgba(255, 154, 158, 0.6); transform: translateY(-5px) scale(1.05); border-color: transparent; 
        }
        .footer-gif { width: 135px; height: 135px; object-fit: contain; }

        .emoji-btn { font-size: 40px; background: transparent; border: none; cursor: pointer; transition: transform 0.2s; filter: grayscale(20%); }
        .emoji-btn:hover { transform: scale(1.25); filter: grayscale(0%); }
        
        #satisfactionModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .satisfaction-box { background: #1a2233; padding: 40px; border-radius: 15px; text-align: center; border: 2px solid var(--neon-cyan); box-shadow: 0 10px 30px rgba(0, 255, 255, 0.2); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="left-panel">
        <h1>✨ Winnie's GIF 動態工坊</h1>
        <p style="margin-top: 0; color: #7f8c8d; font-size: 1.3em;">注入靈魂，讓每一格靜態影像躍動成真</p>
        
        <div class="section">
            <h3>Step 1: 上傳來源</h3>
            <div class="control-group">
                <div class="label-with-btn">
                    <label>A: 上傳長條合圖（1X6）</label>
                    <a href="https://gemini.google.com/gem/1OB5Zs7xRLjH7B45zRVM56Pi8ToUCs7s0?usp=sharing" target="_blank" class="btn-gem">🎨 去 GEM 裡創造</a>
                </div>
                <input type="file" id="spriteUpload" accept="image/*">
            </div>
            <hr style="border-color: #2c394e; margin: 20px 0;">
            <div class="control-group">
                <label>B: 批次上傳多張</label>
                <input type="file" id="multiUpload" accept="image/*" multiple>
            </div>
            <button class="btn-clear" id="clearUploadsBtn">🗑️ 清空重新上傳</button>
        </div>

        <div class="section">
            <h3>Step 2: 處理背景 (智慧去背)</h3>
            <p style="font-size: 0.8em; color: #7f8c8d; margin-top: 0;">點擊顏色並按過濾，將特定背景色變透明。</p>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="color" id="removeColorPicker" value="#ffffff" style="width: 50px; height: 40px; padding: 0; border: none; cursor: pointer;">
                <button class="btn-gem" id="removeBgBtn" style="flex: 1; justify-content: center; font-size:14px; padding:8px;">🪄 智慧邊緣去背</button>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="color" id="bgColorPicker" value="#00ff00" style="width: 50px; height: 40px; padding: 0; border: none; cursor: pointer;">
                <button class="btn-secondary" id="fillBgBtn" style="flex: 1;">🎨 填滿背景色</button>
                <button class="btn-secondary" id="resetBgBtn" style="flex: 1;">↩️ 移除填色</button>
            </div>
        </div>

        <div class="section">
            <h3>Step 3: 確認影格與裁切</h3>
            <div id="framePreviewList"></div>
        </div>

        <div class="section">
            <h3>Step 4: 自訂背景圖 (選填)</h3>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="file" id="backgroundUpload" accept="image/*" style="flex: 1;">
                <button class="btn-clear" id="clearBgImageBtn" style="margin: 0; white-space: nowrap;">🗑️ 移除背景</button>
            </div>
        </div>

        <div class="section">
            <h3>Step 5: 輸出設定</h3>
            <label>⏱️ 速度: <span id="speedVal">200</span> ms</label>
            <input type="range" id="speedRange" min="50" max="1000" step="50" value="200">
            <label>✂️ 形狀:</label>
            <select id="cropShapeSelect">
                <option value="rect">矩形</option>
                <option value="circle">圓形 (大頭貼專用)</option>
            </select>
        </div>

        <button class="btn-primary" id="generateBtn">🔍 載入互動預覽</button>
        
        <div class="footer-container">
            <div class="winnie-badge">🐻 Winnie EdTech Lab</div>
            <img class="footer-gif" src="https://www.ntpc-smart.tw/winnie/wp.gif" alt="Winnie Lab GIF">
        </div>
    </div>

    <div class="right-panel">
        <h3 id="emptyState">💡 完成 Step 1-5 後載入預覽</h3>
        <div id="loading">🚀 正在處理中...</div>
        
        <div id="interactiveBox">
            <h3 style="color: var(--neon-cyan); margin-top: 0;">🖱️ 互動預覽區</h3>
            <canvas id="previewCanvas"></canvas>
            <button class="btn-green" id="renderFinalBtn" style="margin-top: 15px;">⬇️ 鎖定位置並產生 GIF</button>
        </div>

        <div id="resultBox">
            <h3 style="color: #2ecc71; margin-top: 0;">🎉 渲染完成！</h3>
            <img id="gifResult" src=""><br>
            <a id="downloadLink" href="#" download="Winnie_GIF.gif" style="width:100%; display: block;"><button class="btn-green" style="margin-top: 15px;">⬇️ 下載最終 GIF</button></a>
            <button class="btn-secondary" id="backToEditBtn" style="margin-top: 10px;">🔙 返回微調</button>
        </div>
    </div>

    <div id="cropModal">
        <div class="crop-container"><img id="cropImage" src=""></div>
        <div class="crop-actions-main" style="display:flex; flex-wrap: wrap; gap:10px; width:90%; max-width:700px;">
            <button class="btn-secondary" id="saveCropBtn" style="flex:1;">儲存單張</button>
            <button class="btn-green" id="saveCropAllBtn" style="flex:1;">套用至所有影格</button>
            <button class="btn-secondary" id="resetCropBtn" style="flex:1; background: #5a6268;">↩️ 復原裁切</button>
            <button class="btn-clear" onclick="document.getElementById('cropModal').style.display='none'" style="margin:0; flex:1;">取消</button>
        </div>
    </div>

<div id="satisfactionModal">
        <div class="satisfaction-box">
            <div id="voteSection">
                <h2 style="color: var(--neon-cyan); margin-top: 0;">給 Winnie's GIF 動態工坊評個分吧！</h2>
                <p style="color: #7f8c8d; font-size: 0.9em; margin-top: -10px;">您的回饋是我進步的動力 🚀</p>
                <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
                    <button class="emoji-btn" data-score="1">😡</button>
                    <button class="emoji-btn" data-score="2">🙁</button>
                    <button class="emoji-btn" data-score="3">😐</button>
                    <button class="emoji-btn" data-score="4">🙂</button>
                    <button class="emoji-btn" data-score="5">😍</button>
                </div>
            </div>
            <div id="thankYouSection" style="display: none;">
                <h2 style="color: #2ecc71; margin: 20px 0;">✨ 謝謝您的回饋！</h2>
            </div>
        </div>
    </div>
